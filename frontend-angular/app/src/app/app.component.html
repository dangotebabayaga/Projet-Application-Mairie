<!-- Navbar - visible uniquement sur les pages protégées -->
<nav class="navbar" *ngIf="showNavbar">
  <div class="navbar-inner">
    <!-- Logo -->
    <a class="navbar-brand" routerLink="/home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>Ville Connectée</span>
    </a>

    <!-- Liens de navigation -->
    <div class="navbar-links">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.route"
         class="nav-link"
         [class.active]="isActive(link.route)">
        {{ link.label }}
      </a>
    </div>

    <!-- Infos utilisateur -->
    <div class="navbar-user">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>
      <button class="btn-logout" (click)="onLogout()" title="Déconnexion">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</nav>

<!-- Contenu principal -->
<main [class.with-navbar]="showNavbar">
  <router-outlet></router-outlet>
</main>
