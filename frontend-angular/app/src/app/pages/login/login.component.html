<div class="login-page">
  <div class="login-container">
    <!-- Logo et nom de la ville -->
    <div class="city-header">
      <div class="city-logo">{{ cityConfig.logo }}</div>
      <h1 class="city-name">{{ cityConfig.name }}</h1>
      <p class="city-slogan">{{ cityConfig.slogan }}</p>
    </div>

    <!-- Formulaire de connexion -->
    <div class="login-card">
      <div class="card-header">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
          <polyline points="10 17 15 12 10 7"></polyline>
          <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        <h2>Connexion</h2>
      </div>

      <div class="error-message" *ngIf="error">{{ error }}</div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            placeholder="votre@email.fr"
            required
            [disabled]="loading"
          />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              required
              [disabled]="loading"
            />
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="loading || !email || !password"
        >
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <!-- Inscription -->
      <div class="register-link">
        <button type="button" (click)="onRegister()">
          Pas encore inscrit ? Inscrivez-vous ici
        </button>
      </div>
    </div>

    <!-- Info -->
    <div class="footer-info">
      <p>Plateforme de participation citoyenne</p>
    </div>
  </div>
</div>
