<div class="event-detail-page">
  <!-- Chargement -->
  <div class="empty-state" *ngIf="loading">
    <p>Chargement…</p>
  </div>

  <!-- Erreur -->
  <div class="empty-state" *ngIf="error && !loading">
    <p>{{ error }}</p>
    <button class="btn-back" (click)="back()" style="margin-top: 16px;">Retour à l'agenda</button>
  </div>

  <!-- Détail -->
  <div class="event-detail-card" *ngIf="event && !loading">
    <button class="btn-back" (click)="back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Retour à l'agenda
    </button>

    <!-- Photo grand format -->
    <div class="event-image" [class.placeholder]="!event.photo">
      <img *ngIf="event.photo" [src]="event.photo" alt="" />
      <svg *ngIf="!event.photo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </div>

    <div class="event-content">
      <!-- Header : badge thème + bouton favori -->
      <div class="event-header">
        <span class="event-theme" *ngIf="event.type" [ngClass]="getThemeClass(event.type)">
          {{ event.type }}
        </span>
        <button class="btn-favorite"
                [class.saved]="isSaved"
                (click)="toggleSaveEvent()">
          {{ isSaved ? '❤️' : '🤍' }}
        </button>
      </div>

      <h1>{{ event.titre }}</h1>

      <p class="event-description" *ngIf="event.commentaire">{{ event.commentaire }}</p>

      <!-- Détails -->
      <div class="event-details">
        <div class="detail-item" *ngIf="event['date Evenement']">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>{{ formatDate(event['date Evenement']) }}</span>
        </div>
        <div class="detail-item" *ngIf="event['Heure début'] || event['Heure fin']">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span>{{ event['Heure début'] }} - {{ event['Heure fin'] }}</span>
        </div>
        <div class="detail-item" *ngIf="event.lieux">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <span>{{ event.lieux }}</span>
        </div>
      </div>

      <!-- Bouton calendrier -->
      <button class="btn-calendar" (click)="addToCalendar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>Ajouter à Google Calendar</span>
      </button>
    </div>
  </div>
</div>
