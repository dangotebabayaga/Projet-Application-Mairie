<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1>Mot de passe oublié ?</h1>
      <p class="subtitle">
        Saisissez votre adresse email. Si un compte existe, vous recevrez un lien
        pour choisir un nouveau mot de passe (valable 1 heure).
      </p>

      <form (ngSubmit)="onSubmit()" *ngIf="!message" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            placeholder="vous@example.com"
            required
            [disabled]="loading"
          />
        </div>

        <p class="error" *ngIf="error">{{ error }}</p>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Envoi en cours…' : 'Envoyer le lien' }}
        </button>
      </form>

      <div class="success" *ngIf="message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <p>{{ message }}</p>
      </div>

      <div class="auth-link">
        <a routerLink="/login">← Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
