doctrine:
    dbal:
        default_connection: admin
        connections:
            admin:
                url: '%env(resolve:DATABASE_URL_ADMIN)%'
                server_version: '15'
                profiling_collect_backtrace: '%kernel.debug%'
            citoyen:
                url: '%env(resolve:DATABASE_URL_CITOYEN)%'
                server_version: '15'
                profiling_collect_backtrace: '%kernel.debug%'
    orm:
        default_entity_manager: admin
        entity_managers:
            admin:
                connection: admin
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                mappings:
                    App:
                        is_bundle: false
                        type: attribute
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App
            citoyen:
                connection: citoyen
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                mappings:
                    App:
                        is_bundle: false
                        type: attribute
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App

when@test:
    doctrine:
        dbal:
            connections:
                admin:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'
                citoyen:
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            entity_managers:
                admin:
                    query_cache_driver:
                        type: pool
                        pool: doctrine.system_cache_pool
                    result_cache_driver:
                        type: pool
                        pool: doctrine.result_cache_pool
                citoyen:
                    query_cache_driver:
                        type: pool
                        pool: doctrine.system_cache_pool
                    result_cache_driver:
                        type: pool
                        pool: doctrine.result_cache_pool

framework:
    cache:
        pools:
            doctrine.result_cache_pool:
                adapter: cache.app
            doctrine.system_cache_pool:
                adapter: cache.system