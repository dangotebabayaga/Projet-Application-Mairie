services:
  symfony:
    build: ./backend-symfony
    container_name: symfony-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend-symfony/app:/var/www
      # Volumes nommés pour vendor/ et var/cache/ : évite le bind mount Windows
      # qui est extrêmement lent (FUSE), gain de perf majeur
      - symfony_vendor:/var/www/vendor
      - symfony_cache:/var/www/var/cache
    depends_on:
      - db
    command: bash -c "php -S 0.0.0.0:8000 -t public"

  angular:
    build: ./frontend-angular
    container_name: angular-app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-angular/app:/app
    command: bash -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000"

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: unicity_db
      POSTGRES_USER: unicity_user
      POSTGRES_PASSWORD: unicity_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/SimplifiUniCyties.sql:/docker-entrypoint-initdb.d/init.sql

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI (consulter les mails reçus)

volumes:
  pgdata:
  symfony_vendor:
  symfony_cache:

