services:
  symfony:
    build: ./backend-symfony
    container_name: symfony-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend-symfony/app:/var/www
    depends_on:
      - db
    command: bash -c "php -S 0.0.0.0:8000 -t public"

  angular:
    build: ./frontend-angular
    container_name: angular-app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend-angular/app:/app
    command: bash -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000"

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: unicity_db
      POSTGRES_USER: unicity_user
      POSTGRES_PASSWORD: unicity_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Base_de_donnee/SimplifiUniCyties.sql:/docker-entrypoint-initdb.d/init.sql
      - ./Base_de_donnee/migrations:/migrations
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        sleep 5 &&
        bash /migrations/apply_migrations.sh &&
        wait
      "

volumes:
  pgdata:

